<h2
  [attr.id]="id || null"
  class="section-title text-3xl sm:text-4xl font-bold text-center mb-12 sm:mb-16 font-mono text-accent-1 relative py-4"
>
  <span class="relative z-10">{{ text }}</span>
  <span class="section-title-shadow absolute left-1/2 top-1/2 text-5xl sm:text-7xl font-bold text-secondary-bg opacity-30 z-0">{{ text }}</span>
</h2>
