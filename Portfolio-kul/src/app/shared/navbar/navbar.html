<nav
  class="fixed top-4 left-0 right-0 z-50 mx-auto w-[95%] max-w-6xl rounded-md transition-all duration-300"
  [class.bg-secondary-bg]="scrolled"
  [class.bg-opacity-20]="scrolled"
  [class.backdrop-blur-lg]="scrolled"
  [class.border]="scrolled"
  [class.border-white]="scrolled"
  [class.border-opacity-5]="scrolled"
  [class.shadow-lg]="scrolled"
>
  <div class="px-6 h-16 flex justify-between items-center">
    <button
      type="button"
      (click)="scrollTo('hero')"
      class="cursor-pointer text-2xl font-bold font-mono tracking-tighter bg-gradient-to-r from-accent-1 to-accent-2 bg-clip-text text-transparent hover:scale-105 transition-transform"
      aria-label="Go to hero"
    >
      &lt;Kul /&gt;
    </button>

    <div class="hidden md:flex items-center space-x-6 h-full">
      <div class="flex items-center space-x-8 h-full">
        <button
          *ngFor="let link of navLinks"
          type="button"
          (click)="scrollTo(link.to)"
          class="relative text-lg cursor-pointer text-base font-medium text-text-secondary hover:text-accent-1 transition-colors group flex items-center h-full"
        >
          {{ link.name }}
          <span class="absolute bottom-4 left-0 w-0 h-0.5 bg-accent-1 transition-all duration-300 group-hover:w-full"></span>
        </button>

        <a
          [href]="'mailto:' + personalInfo.email"
          class="px-5 py-2 text-md font-mono font-bold text-accent-1 border border-accent-1 rounded hover:bg-accent-1 hover:text-primary-bg transition-all duration-300 transform hover:-translate-y-0.5 shadow-lg hover:shadow-accent-1/20"
        >
          RESUME
        </a>
      </div>

      <button
        type="button"
        (click)="toggleTheme()"
        class="flex h-12 w-12 items-center justify-center rounded-full border border-text-secondary text-text-secondary hover:bg-text-secondary/10 transition-all duration-300"
        aria-label="Toggle theme"
      >
        <svg viewBox="0 0 24 24" class="w-6 h-6" fill="currentColor" aria-hidden="true">
          <path d="M12 2C10.38 2 9 3.34 9 5C9 5 8.2 5.2 6.94 4.1C5.33 2.73 3 2.64 1.42 4.19L0 5.61L1.87 7.5L3.91 6.62C5.12 8.04 7.1 9 9.3 9C9.3 9 8.92 11.02 8.11 12.53C7.3 14.03 5.73 15 4 15C4 15 4.27 16.52 5.3 17.5C6.33 18.48 7.5 18.5 8 18.5C8 18.5 8.25 19.66 9.5 20C10.92 20.38 12 18.5 12 18.5C12 18.5 13.08 20.38 14.5 20C15.75 19.66 16 18.5 16 18.5C16.5 18.5 17.67 18.48 18.7 17.5C19.73 16.52 20 15 20 15C18.27 15 16.7 14.03 15.89 12.53C15.08 11.02 14.7 9 14.7 9C16.9 9 18.88 8.04 20.09 6.62L22.13 7.5L24 5.61L22.58 4.19C21 2.64 18.67 2.73 17.06 4.1C15.8 5.2 15 5 15 5C15 3.34 13.62 2 12 2Z" />
        </svg>
      </button>
    </div>

    <button
      class="md:hidden text-text-primary focus:outline-none flex items-center"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isOpen"
      aria-label="Toggle menu"
      type="button"
    >
      <span *ngIf="!isOpen" class="text-2xl">&#9776;</span>
      <span *ngIf="isOpen" class="text-2xl">&#10005;</span>
    </button>
  </div>

  <div
    *ngIf="isOpen"
    class="md:hidden bg-secondary-bg bg-opacity-95 backdrop-blur-xl border-t border-white border-opacity-10 overflow-hidden rounded-b-md"
  >
    <div class="flex flex-col items-center py-6 space-y-6">
      <button
        *ngFor="let link of navLinks"
        type="button"
        (click)="scrollTo(link.to)"
        class="cursor-pointer text-lg text-text-primary hover:text-accent-1 font-medium"
      >
        {{ link.name }}
      </button>

      <button
        type="button"
        (click)="toggleTheme()"
        class="flex h-12 w-12 items-center justify-center rounded-full border border-text-secondary text-text-secondary hover:bg-text-secondary/10 transition-all duration-300"
        aria-label="Toggle theme"
      >
        <svg viewBox="0 0 24 24" class="w-6 h-6" fill="currentColor" aria-hidden="true">
          <path d="M12 2C10.38 2 9 3.34 9 5C9 5 8.2 5.2 6.94 4.1C5.33 2.73 3 2.64 1.42 4.19L0 5.61L1.87 7.5L3.91 6.62C5.12 8.04 7.1 9 9.3 9C9.3 9 8.92 11.02 8.11 12.53C7.3 14.03 5.73 15 4 15C4 15 4.27 16.52 5.3 17.5C6.33 18.48 7.5 18.5 8 18.5C8 18.5 8.25 19.66 9.5 20C10.92 20.38 12 18.5 12 18.5C12 18.5 13.08 20.38 14.5 20C15.75 19.66 16 18.5 16 18.5C16.5 18.5 17.67 18.48 18.7 17.5C19.73 16.52 20 15 20 15C18.27 15 16.7 14.03 15.89 12.53C15.08 11.02 14.7 9 14.7 9C16.9 9 18.88 8.04 20.09 6.62L22.13 7.5L24 5.61L22.58 4.19C21 2.64 18.67 2.73 17.06 4.1C15.8 5.2 15 5 15 5C15 3.34 13.62 2 12 2Z" />
        </svg>
      </button>

      <a
        [href]="'mailto:' + personalInfo.email"
        class="px-8 py-3 text-sm font-bold text-accent-1 border border-accent-1 rounded hover:bg-accent-1 hover:text-primary-bg transition-colors"
        (click)="closeMenu()"
      >
        RESUME
      </a>
    </div>
  </div>
</nav>
