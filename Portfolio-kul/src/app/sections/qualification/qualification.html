<section id="experience" class="py-24 bg-secondary-bg relative overflow-hidden">
	<div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-5 pointer-events-none">
		<div class="absolute top-10 right-10 w-64 h-64 bg-accent-1 rounded-full blur-[80px]"></div>
	</div>

	<div class="container mx-auto px-6 lg:px-20 relative z-10">
		<app-section-title text="Experiences"></app-section-title>

		<div class="mt-16 relative">
			<div class="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-0.5 bg-gradient-to-b from-accent-1 via-accent-2 to-transparent opacity-30"></div>

			<div class="space-y-12">
				<div *ngFor="let exp of experience" class="relative flex flex-col md:flex-row items-start md:items-center reveal-x">
					<div class="absolute left-1/2 top-1/2 w-4 h-4 bg-primary-bg border-2 border-accent-1 rounded-full -translate-x-1/2 -translate-y-1/2 z-10 shadow-[0_0_10px_rgba(0,245,195,0.8)]"></div>

					<div class="md:w-1/2 md:pr-12">
						<div class="bg-primary-bg/80 backdrop-blur-md p-6 rounded-xl border border-white/5 shadow-lg hover:border-accent-1/30 transition-colors group">
							<h3 class="text-xl font-bold text-text-primary group-hover:text-accent-1 transition-colors">
								{{ exp.role }}
							</h3>
							<h4 class="text-lg font-semibold text-accent-2 mb-4">
								{{ exp.organization }}
							</h4>
							<ul class="space-y-2">
								<li *ngFor="let point of exp.points" class="flex items-start text-sm text-text-secondary/90">
									<span class="text-accent-1 mr-2 mt-1.5">&gt;</span>
									<span>{{ point }}</span>
								</li>
							</ul>
						</div>
					</div>

					<span class="font-mono text-sm text-accent-1 md:absolute md:top-1/2 md:left-[calc(50%+1rem)] md:-translate-y-1/2 md:whitespace-nowrap">{{ exp.duration }}</span>
					<div class="hidden md:block md:w-1/2"></div>
				</div>
			</div>
		</div>
	</div>
</section>
