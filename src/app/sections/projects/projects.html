<section id="projects" class="py-32 bg-primary-bg">
	<div class="container mx-auto px-6 lg:px-12">
		<app-section-title text="Some Things I Have Built"></app-section-title>

		<div class="flex flex-col gap-24 mt-20">
			<div
				*ngFor="let project of projects; let index = index"
				class="flex flex-col gap-12 items-start reveal-up md:flex md:items-center md:justify-between md:gap-16"
				[ngClass]="{ 'md:flex-row-reverse': index % 2 === 1, 'md:flex-row': index % 2 === 0 }"
			>
				<div class="w-full md:w-7/12 relative group">
					<div class="relative rounded-md overflow-hidden shadow-2xl border border-white/10 group-hover:border-accent-1/30 transition-all duration-300">
						<div class="absolute inset-0 bg-secondary-bg/20 group-hover:bg-transparent transition-all duration-500 z-10"></div>
						<img
							[src]="project.image"
							[alt]="project.title"
							class="w-full h-auto object-cover transform transition-transform duration-700 grayscale group-hover:grayscale-0"
						/>
					</div>
					<div class="absolute -inset-4 bg-accent-1/20 rounded-md blur-xl -z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
				</div>

				<div class="w-full md:w-5/12 flex flex-col relative z-20"
					[ngClass]="{ 'md:items-start md:text-left md:pr-12 md:pl-0': index % 2 === 1, 'md:items-start md:text-left md:pl-12 md:pr-0': index % 2 === 0 }"
				>
					<p class="font-mono text-accent-1 text-sm mb-2">Featured Project</p>
					<h3 class="text-3xl font-bold text-text-primary mb-6 hover:text-accent-1 transition-colors cursor-pointer">
						{{ project.title }}
					</h3>

					<div class="bg-secondary-bg p-6 rounded-md shadow-xl border border-white/5 mb-6 hover:shadow-2xl transition-shadow">
						<ul class="list-none space-y-2 text-text-secondary leading-relaxed">
							<li *ngFor="let point of project.description" class="flex items-start">
								<span class="text-accent-1 mr-2 mt-1">&gt;</span>
								<span>{{ point }}</span>
							</li>
						</ul>
					</div>

					<ul class="flex flex-wrap gap-4 mb-8 text-sm font-mono text-text-secondary/80">
						<li *ngFor="let tech of project.tech" class="hover:text-accent-1 transition-colors">
							{{ tech }}
						</li>
					</ul>

					<div class="flex items-center gap-4">
						<a
							*ngIf="project.githubLink"
							[href]="project.githubLink"
							target="_blank"
							rel="noreferrer"
							class="flex items-center gap-2 px-5 py-2.5 rounded-full border border-text-secondary/30 text-text-primary text-sm font-medium hover:border-accent-1 hover:text-accent-1 transition-all duration-300"
						>
							GitHub Repo
						</a>
						<a
							*ngIf="project.liveLink"
							[href]="project.liveLink"
							target="_blank"
							rel="noreferrer"
							class="flex items-center gap-2 px-5 py-2.5 rounded-full border border-text-secondary/30 text-text-primary text-sm font-medium hover:border-accent-1 hover:text-accent-1 transition-all duration-300"
						>
							Live Demo
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
