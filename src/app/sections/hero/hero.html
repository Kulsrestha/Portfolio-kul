<section
	id="hero"
	class="relative w-full h-screen flex items-center justify-center overflow-hidden bg-primary-bg"
>
	<div class="blob blob-one absolute top-20 left-20 w-72 h-72 bg-accent-1 rounded-full opacity-20 blur-[100px]"></div>
	<div class="blob blob-two absolute bottom-20 right-20 w-96 h-96 bg-accent-2 rounded-full opacity-20 blur-[120px]"></div>

	<div class="container mx-auto px-6 relative z-10 text-center">
		<p class="text-accent-1 font-mono mb-4 text-lg sm:text-xl tracking-wide animate-slide-in-bottom">
			Hi, my name is
		</p>

		<h1
			class="text-5xl sm:text-7xl md:text-8xl font-bold mb-6 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-text-primary via-white to-text-secondary animate-text-focus-in"
		>
			{{ personalInfo.name }}.
		</h1>

		<div class="h-20 sm:h-24 md:h-28">
			<h2 class="text-3xl sm:text-5xl md:text-6xl font-bold text-text-secondary mb-8">
				I
				<span class="text-accent-2"> {{ typedText }}<span class="typing-cursor">|</span></span>
			</h2>
		</div>

		<p class="max-w-4xl mx-auto text-text-secondary text-base sm:text-lg mb-10 leading-relaxed">
			{{ personalInfo.summary }}
		</p>

		<div class="flex items-center justify-center gap-8">
			<a
				[href]="personalInfo.github"
				target="_blank"
				rel="noreferrer"
				class="text-text-secondary hover:text-white transition-colors transform hover:scale-110"
				aria-label="GitHub"
			>
				<svg viewBox="0 0 24 24" class="w-7 h-7" fill="currentColor" aria-hidden="true">
					<path d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12.02c0 5.09 3.3 9.4 7.88 10.93.58.1.79-.25.79-.56 0-.28-.01-1.02-.01-2.01-3.21.7-3.89-1.55-3.89-1.55-.53-1.34-1.3-1.7-1.3-1.7-1.06-.73.08-.72.08-.72 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.72 1.26 3.39.96.11-.74.41-1.26.75-1.55-2.56-.29-5.26-1.28-5.26-5.68 0-1.25.45-2.27 1.19-3.07-.12-.29-.52-1.45.11-3.03 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 2.9-.39c.98.01 1.97.13 2.9.39 2.21-1.49 3.18-1.18 3.18-1.18.63 1.58.23 2.74.11 3.03.74.8 1.19 1.82 1.19 3.07 0 4.41-2.71 5.38-5.29 5.67.42.37.8 1.1.8 2.22 0 1.6-.01 2.88-.01 3.27 0 .31.21.67.8.56 4.58-1.54 7.88-5.84 7.88-10.93C23.5 5.65 18.35.5 12 .5Z" />
				</svg>
			</a>
			<a
				[href]="personalInfo.linkedin"
				target="_blank"
				rel="noreferrer"
				class="text-text-secondary hover:text-accent-1 transition-colors transform hover:scale-110"
				aria-label="LinkedIn"
			>
				<svg viewBox="0 0 24 24" class="w-7 h-7" fill="currentColor" aria-hidden="true">
					<path d="M4.98 3.5C3.35 3.5 2 4.85 2 6.48c0 1.62 1.33 2.96 2.98 2.96h.03C6.6 9.44 8 8.1 8 6.48 8 4.85 6.65 3.5 4.98 3.5Zm.02 4.9H4.9C4.07 8.4 3.5 7.8 3.5 6.95 3.5 6.07 4.1 5.5 4.98 5.5c.87 0 1.48.57 1.48 1.45 0 .86-.57 1.45-1.48 1.45Zm1.51 2.04H3.5V20h3V10.44Zm6.12 0H9.62V20h3v-5.9c0-1.58.3-3.1 2.24-3.1 1.92 0 1.94 1.75 1.94 3.19V20h3v-6.28C20.79 11.03 21.2 9 18.7 9c-2.4 0-3.36 1.16-3.9 1.96v-.02Z" />
				</svg>
			</a>
		</div>
	</div>

	<button
		type="button"
		(click)="scrollTo('about')"
		class="chevron absolute bottom-10 left-1/2 -translate-x-1/2 text-text-secondary/50"
		aria-label="Scroll down"
	>
		<span class="text-2xl">v</span>
	</button>
</section>
